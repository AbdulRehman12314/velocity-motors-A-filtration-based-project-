<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Auto Showroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand-section">
            <h1>Velocity<span>Motors</span></h1>
            <p>Discover Ultimate Performance & Luxury</p>
        </div>
        
        <div class="filter-box">
            <label for="brandFilter">Filter By Manufacturer</label>
            <select id="brandFilter">
                <option value="all">All Fleet</option>
                <option value="tesla">Tesla</option>
                <option value="ford">Ford</option>
                <option value="bmw">BMW</option>
                <option value="audi">Audi</option>
                <option value="porsche">Porsche</option>
            </select>
        </div>
    </header>

    <main class="products-container" id="productsContainer">
        </main>

    <script src="script.js"></script>
</body>
</html>
